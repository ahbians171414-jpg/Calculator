<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Casio MJ-12D Universal Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Share+Tech+Mono&display=swap');

        body {
            background-color: #e0e5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            user-select: none;
        }

        .calc-body {
            background: #2b2b2b;
            background: linear-gradient(135deg, #2b2b2b 0%, #1a1a1a 100%);
            width: 340px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                inset 0 2px 3px rgba(255,255,255,0.1),
                inset 0 -2px 3px rgba(0,0,0,0.5);
            border: 1px solid #111;
        }

        .branding {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
            color: #d1d1d1;
            padding: 0 5px;
        }

        .casio-logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #eeeeee;
        }

        .solar-panel {
            width: 90px;
            height: 24px;
            background: #4a3e35;
            border-radius: 2px;
            border: 2px solid #1c1c1c;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }
        
        .solar-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 20%; width: 2px; height: 100%; background: #332a24;
            box-shadow: 20px 0 0 #332a24, 40px 0 0 #332a24, 60px 0 0 #332a24;
        }

        .model-info {
            font-size: 11px;
            text-align: right;
            font-weight: 500;
        }
        .model-info span.big {
            font-size: 15px;
            font-weight: 700;
            margin-left: 2px;
        }
        .model-info div.digits {
            font-size: 8px;
            line-height: 8px;
        }

        .screen-container {
            background-color: #a8b8a5; 
            border-radius: 6px;
            padding: 10px;
            border: 3px solid #1a1a1a;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 75px;
            position: relative;
        }

        .indicators {
            display: flex;
            font-size: 10px;
            font-weight: 700;
            color: rgba(0,0,0,0.8);
            gap: 15px;
            height: 12px;
        }
        
        .indicators span {
            visibility: hidden;
        }
        .indicators span.active {
            visibility: visible;
        }

        .display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 38px;
            text-align: right;
            color: #111;
            letter-spacing: -1px;
            overflow: hidden;
            white-space: nowrap;
            line-height: 1;
        }

        .top-btn-row {
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            margin-bottom: 12px;
            gap: 8px;
        }

        .small-btn {
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            padding: 6px 4px;
            min-width: 45px;
            box-shadow: 0 3px 0 #111, inset 0 1px 2px rgba(255,255,255,0.2);
            cursor: pointer;
            text-align: center;
            line-height: 1.1;
        }
        .small-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #111, inset 0 1px 2px rgba(255,255,255,0.2);
        }

        .steps-box {
            background: #e2e2e2;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #777;
        }
        .steps-label {
            font-size: 9px;
            color: #555;
            font-weight: bold;
            margin-bottom: 4px;
            text-align: center;
        }
        .steps-arrows {
            display: flex;
            gap: 4px;
        }
        .arrow-btn {
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            width: 40px;
            height: 22px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 0 #111;
            cursor: pointer;
        }
        .arrow-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #111;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 42px);
            gap: 8px 10px;
        }

        .btn {
            background: #2a2a2a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 500;
            box-shadow: 0 4px 0 #0a0a0a, inset 0 1px 2px rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0a0a0a, inset 0 1px 2px rgba(255,255,255,0.1);
        }

        .btn-light {
            background: #fdfdfd;
            color: #222;
            box-shadow: 0 4px 0 #aaa, inset 0 1px 2px rgba(255,255,255,0.8);
            font-size: 13px;
            font-weight: bold;
        }
        .btn-light:active { box-shadow: 0 0 0 #aaa; }

        .btn-gray {
            background: #555555;
            box-shadow: 0 4px 0 #222, inset 0 1px 2px rgba(255,255,255,0.2);
            font-size: 14px;
        }
        .btn-gray:active { box-shadow: 0 0 0 #222; }

        .btn-purple {
            background: #9d3e81; 
            box-shadow: 0 4px 0 #521d42, inset 0 1px 2px rgba(255,255,255,0.2);
        }
        .btn-purple:active { box-shadow: 0 0 0 #521d42; }

        .btn-num {
            background: #333333;
            font-size: 20px;
        }

        .text-sm { font-size: 13px; }

        .btn-plus {
            grid-column: 4;
            grid-row: 4 / span 2;
            height: 100%;
        }
        
        .btn-disp { grid-area: 1 / 1; }
        .btn-bs { grid-area: 1 / 2; }
        .btn-sign { grid-area: 1 / 3; }
        .btn-sqrt { grid-area: 1 / 4; }
        .btn-mu { grid-area: 1 / 5; }
        .btn-gt { grid-area: 1 / 6; }
        
        .btn-7 { grid-area: 2 / 1; }
        .btn-8 { grid-area: 2 / 2; }
        .btn-9 { grid-area: 2 / 3; }
        .btn-pct { grid-area: 2 / 4; }
        .btn-c { grid-area: 2 / 5; }
        .btn-ac { grid-area: 2 / 6; }
        
        .btn-4 { grid-area: 3 / 1; }
        .btn-5 { grid-area: 3 / 2; }
        .btn-6 { grid-area: 3 / 3; }
        .btn-mul { grid-area: 3 / 4; }
        .btn-div { grid-area: 3 / 5; }
        .btn-mrc { grid-area: 3 / 6; }
        
        .btn-1 { grid-area: 4 / 1; }
        .btn-2 { grid-area: 4 / 2; }
        .btn-3 { grid-area: 4 / 3; }
        .btn-minus { grid-area: 4 / 5; }
        .btn-m-minus { grid-area: 4 / 6; }
        
        .btn-0 { grid-area: 5 / 1; }
        .btn-00 { grid-area: 5 / 2; }
        .btn-dot { grid-area: 5 / 3; }
        .btn-eq { grid-area: 5 / 5; }
        .btn-m-plus { grid-area: 5 / 6; }

                * {
                    -webkit-tap-highlight-color: transparent;
                }

                html, body {
                    width: 100%;
                    overflow-x: hidden;
                    -webkit-text-size-adjust: 100%;
                }

                body {
                    touch-action: manipulation;
                    padding: 16px;
                    box-sizing: border-box;
                    min-height: 100vh;
                    min-height: 100svh;
                }

                .calc-body {
                    width: min(340px, calc(100vw - 32px));
                    max-width: 100%;
                }

                button {
                    touch-action: manipulation;
                    -webkit-appearance: none;
                    appearance: none;
                }

                .display {
                    font-size: clamp(30px, 8.8vw, 38px);
                }

                .keypad {
                    grid-template-rows: repeat(5, minmax(42px, 1fr));
                    gap: clamp(6px, 1.4vw, 10px) clamp(7px, 1.8vw, 10px);
                }

                @media (max-width: 380px) {
                    .calc-body {
                        padding: 14px;
                        border-radius: 10px;
                    }

                    .top-btn-row {
                        gap: 6px;
                        flex-wrap: wrap;
                    }

                    .small-btn, .arrow-btn {
                        min-width: unset;
                    }

                    .small-btn {
                        padding: 6px 3px;
                    }

                    .steps-box {
                        flex: 1 1 100%;
                    }
                }
    </style>
</head>
<body>

    <div class="calc-body">
        
        <div class="branding">
            <div class="casio-logo">CASIO</div>
            <div class="solar-panel"></div>
            <div class="model-info">
                MJ-12D <span class="big">12</span><br>
                <div class="digits">DIGITS</div>
            </div>
        </div>

        <div class="screen-container">
            <div class="indicators">
                <span id="ind-m">M</span>
                <span id="ind-gt">GT</span>
                <span id="ind-minus">-</span>
                <span id="ind-e">E</span>
                <span id="ind-rev">REV</span>
                <span id="ind-step">00</span>
            </div>
            <div class="display" id="display">0</div>
        </div>

        <div class="top-btn-row">
            <button class="small-btn" onclick="autoReview()">AUTO<br>REVIEW</button>
            <button class="small-btn" onclick="flashDisplay()">CORRECT</button>
            
            <div class="steps-box">
                <div class="steps-label">150 STEPS CHECK</div>
                <div class="steps-arrows">
                    <button class="arrow-btn" onclick="prevStep()">&#9650;</button>
                    <button class="arrow-btn" onclick="nextStep()">&#9660;</button>
                </div>
            </div>
        </div>

        <div class="keypad">
            <button class="btn btn-light btn-disp" onclick="toggleFormat()">DISP</button>
            <button class="btn btn-gray btn-bs" onclick="backspace()">&#9658;</button>
            <button class="btn btn-gray btn-sign" onclick="toggleSign()">+/-</button>
            <button class="btn btn-gray btn-sqrt" onclick="calculateRoot()">&radic;</button>
            <button class="btn btn-gray btn-mu text-sm" onclick="markUp()">MU</button>
            <button class="btn btn-gray btn-gt text-sm" onclick="handleGT()">GT</button>

            <button class="btn btn-num btn-7" onclick="inputDigit('7')">7</button>
            <button class="btn btn-num btn-8" onclick="inputDigit('8')">8</button>
            <button class="btn btn-num btn-9" onclick="inputDigit('9')">9</button>
            <button class="btn btn-gray btn-pct" onclick="calculatePercentage()">%</button>
            <button class="btn btn-purple btn-c" onclick="clearEntry()">C</button>
            <button class="btn btn-purple btn-ac text-sm" onclick="allClear()">AC <span style="font-size:8px;margin-left:2px;">ON</span></button>

            <button class="btn btn-num btn-4" onclick="inputDigit('4')">4</button>
            <button class="btn btn-num btn-5" onclick="inputDigit('5')">5</button>
            <button class="btn btn-num btn-6" onclick="inputDigit('6')">6</button>
            <button class="btn btn-gray btn-mul" onclick="handleOperator('*')">&times;</button>
            <button class="btn btn-gray btn-div" onclick="handleOperator('/')">&divide;</button>
            <button class="btn btn-gray btn-mrc text-sm" onclick="handleMRC()">MRC</button>

            <button class="btn btn-num btn-1" onclick="inputDigit('1')">1</button>
            <button class="btn btn-num btn-2" onclick="inputDigit('2')">2</button>
            <button class="btn btn-num btn-3" onclick="inputDigit('3')">3</button>
            <button class="btn btn-gray btn-plus" onclick="handleOperator('+')">+</button>
            <button class="btn btn-gray btn-minus" onclick="handleOperator('-')">-</button>
            <button class="btn btn-gray btn-m-minus text-sm" onclick="memorySub()">M-</button>

            <button class="btn btn-num btn-0" onclick="inputDigit('0')">0</button>
            <button class="btn btn-num btn-00 text-sm" onclick="inputDigit('00')">00</button>
            <button class="btn btn-num btn-dot" onclick="inputDecimal()">.</button>
            <button class="btn btn-gray btn-eq" onclick="calculate()">=</button>
            <button class="btn btn-gray btn-m-plus text-sm" onclick="memoryAdd()">M+</button>
        </div>

    </div>

        <script>
        // Core state
        let displayValue = '0';
        let firstOperand = null;
        let operator = null;
        let waitingForSecondOperand = false;

        let repeatOperator = null;
        let repeatOperand = null;

        let memory = 0;
        let grandTotal = 0;
        let error = false;
        let isIndianFormat = true;

        // Review / step system
        let historySteps = [];
        let reviewIndex = -1;
        let isReviewing = false;
        let mrcCount = 0;

        const MAX_DIGITS = 12;

        // UI references
        const displayEl = document.getElementById('display');
        const indM = document.getElementById('ind-m');
        const indGT = document.getElementById('ind-gt');
        const indMinus = document.getElementById('ind-minus');
        const indE = document.getElementById('ind-e');
        const indRev = document.getElementById('ind-rev');
        const indStep = document.getElementById('ind-step');

        function parseDisplayValue() {
            const n = Number(String(displayValue).replace(/,/g, ''));
            return Number.isFinite(n) ? n : 0;
        }

        function round12(value) {
            if (!Number.isFinite(value)) {
                error = true;
                return 0;
            }
            return Number.parseFloat(Number(value).toPrecision(12));
        }


        function countSignificantDigits(value) {
            let s = String(value).trim().replace(/,/g, '');

            if (s === '' || s === '0' || s === '-0') return 1;
            if (s === 'NaN' || s === 'Infinity' || s === '-Infinity') return 0;

            s = s.replace(/^[+-]/, '');

            if (/[eE]/.test(s)) {
                const [mantissa] = s.split(/[eE]/);
                return mantissa.replace('.', '').replace(/^0+/, '').length || 1;
            }

            const parts = s.split('.');
            const intPart = (parts[0] || '').replace(/^0+/, '');
            const decPart = parts.slice(1).join('');
            const digits = (intPart + decPart).replace(/^0+/, '');
            return digits.length || 1;
        }

        function formatForDisplay(value) {
            if (value === null || value === undefined) return '0';

            const n = Number(String(value).replace(/,/g, ''));
            if (!Number.isFinite(n)) {
                return '0';
            }

            let s = n.toPrecision(MAX_DIGITS);

            if (!/[eE]/.test(s)) {
                s = s.replace(/(\.\d*?[1-9])0+$/, '$1');
                s = s.replace(/\.0+$/, '');
                s = s.replace(/\.$/, '');
            }

            return s;
        }

        function normalizeNumberString(value) {
            let s = String(value);

            if (s === 'NaN' || s === 'Infinity' || s === '-Infinity') {
                error = true;
                return '0';
            }

            if (s.includes('e') || s.includes('E')) {
                return s;
            }

            let sign = '';
            if (s.startsWith('-')) {
                sign = '-';
                s = s.slice(1);
            }

            const parts = s.split('.');
            let integerPart = parts[0] || '0';
            const decimalPart = parts.length > 1 ? '.' + parts.slice(1).join('.') : '';

            if (isIndianFormat) {
                if (integerPart.length > 3) {
                    const lastThree = integerPart.slice(-3);
                    const other = integerPart.slice(0, -3).replace(/\B(?=(\d{2})+(?!\d))/g, ',');
                    integerPart = other ? other + ',' + lastThree : lastThree;
                }
            } else {
                integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }

            return sign + integerPart + decimalPart;
        }


        function render() {
            let targetValue = displayValue;

            if (isReviewing && reviewIndex >= 0 && reviewIndex < historySteps.length) {
                targetValue = historySteps[reviewIndex].val;
                indRev.classList.add('active');
                indStep.classList.add('active');
                indStep.textContent = String(reviewIndex + 1).padStart(2, '0');
            } else {
                indRev.classList.remove('active');
                indStep.classList.remove('active');
                indStep.textContent = '00';
            }

            if (error) {
                displayEl.textContent = '0';
                indE.classList.add('active');
            } else {
                indE.classList.remove('active');
                displayEl.textContent = normalizeNumberString(formatForDisplay(targetValue));
            }

            if (String(targetValue).startsWith('-')) {
                indMinus.classList.add('active');
            } else {
                indMinus.classList.remove('active');
            }

            if (memory !== 0) indM.classList.add('active');
            else indM.classList.remove('active');

            if (grandTotal !== 0) indGT.classList.add('active');
            else indGT.classList.remove('active');
        }

        function updateDisplay() {
            render();
        }

        function clearRepeatState() {
            repeatOperator = null;
            repeatOperand = null;
        }

        function recordStep(val, op) {
            if (historySteps.length >= 150) historySteps.shift();
            historySteps.push({ val: String(val), op: op });
        }

        function exitReview() {
            isReviewing = false;
            reviewIndex = -1;
            updateDisplay();
        }

        function performCalculation(op, v1, v2) {
            let res = 0;
            switch (op) {
                case '+':
                    res = v1 + v2;
                    break;
                case '-':
                    res = v1 - v2;
                    break;
                case '*':
                    res = v1 * v2;
                    break;
                case '/':
                    if (v2 === 0) {
                        error = true;
                        return 0;
                    }
                    res = v1 / v2;
                    break;
                default:
                    res = v2;
            }
            return round12(res);
        }

        function inputDigit(digit) {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;

            if (waitingForSecondOperand) {
                displayValue = digit;
                waitingForSecondOperand = false;
                updateDisplay();
                return;
            }

            if (displayValue === '0') {
                displayValue = digit === '00' ? '0' : digit;
            } else {
                const raw = displayValue.replace(/,/g, '');
                const currentDigits = raw.replace(/^-/, '').replace(/\./g, '');
                if (currentDigits.length >= MAX_DIGITS) return;
                displayValue = raw + digit;
            }
            updateDisplay();
        }

        function inputDecimal() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;

            if (waitingForSecondOperand) {
                displayValue = '0.';
                waitingForSecondOperand = false;
                updateDisplay();
                return;
            }

            if (!displayValue.includes('.')) {
                displayValue += '.';
                updateDisplay();
            }
        }

        function backspace() {
            if (isReviewing) exitReview();
            if (error || waitingForSecondOperand) return;
            mrcCount = 0;

            let str = String(displayValue);
            if (str.length > 1) {
                str = str.slice(0, -1);
                if (str === '-' || str === '') str = '0';
                displayValue = str;
            } else {
                displayValue = '0';
            }
            updateDisplay();
        }

        function toggleSign() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;

            const val = parseDisplayValue();
            if (Object.is(val, 0)) {
                displayValue = '0';
            } else {
                displayValue = String(round12(val * -1));
            }
            updateDisplay();
        }

        function handleOperator(nextOperator) {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;

            const inputValue = parseDisplayValue();

            if (operator && waitingForSecondOperand) {
                operator = nextOperator;
                clearRepeatState();
                updateDisplay();
                return;
            }

            if (firstOperand === null) {
                firstOperand = inputValue;
            } else if (operator) {
                const result = performCalculation(operator, firstOperand, inputValue);
                if (error) return;
                displayValue = String(result);
                firstOperand = result;
                recordStep(String(inputValue), nextOperator);
                updateDisplay();
            } else {
                firstOperand = inputValue;
            }

            operator = nextOperator;
            waitingForSecondOperand = true;
            clearRepeatState();
            updateDisplay();
        }

        function calculate() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;

            if (operator !== null) {
                const left = firstOperand === null ? parseDisplayValue() : firstOperand;
                const hasExplicitSecondOperand = !waitingForSecondOperand;
                const right = hasExplicitSecondOperand ? parseDisplayValue() : left;
                let result;

                if (operator === '/' && !hasExplicitSecondOperand) {
                    if (left === 0) {
                        error = true;
                        updateDisplay();
                        return;
                    }
                    result = round12(1 / left);
                    repeatOperator = '/';
                    repeatOperand = left;
                } else {
                    result = performCalculation(operator, left, right);
                    if (error) return;
                    repeatOperator = operator;
                    repeatOperand = right;
                }

                recordStep(String(right), '=');
                recordStep(String(result), '');

                grandTotal += result;
                displayValue = String(result);
                firstOperand = result;

                operator = null;
                waitingForSecondOperand = true;
                updateDisplay();
                return;
            }

            if (repeatOperator !== null && repeatOperand !== null) {
                const left = parseDisplayValue();
                const result = performCalculation(repeatOperator, left, repeatOperand);
                if (error) return;

                recordStep(String(repeatOperand), '=');
                recordStep(String(result), '');

                grandTotal += result;
                displayValue = String(result);
                firstOperand = result;
                waitingForSecondOperand = true;
                updateDisplay();
            }
        }

        function calculatePercentage() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;

            const inputValue = parseDisplayValue();
            let result = 0;

            if (operator === '*' || operator === '/') {
                result = performCalculation(operator, firstOperand, inputValue / 100);
            } else if (operator === '+' || operator === '-') {
                result = performCalculation(operator, firstOperand, firstOperand * (inputValue / 100));
            } else {
                result = round12(inputValue / 100);
            }

            if (error) return;

            recordStep(String(inputValue) + '%', '=');
            recordStep(String(result), '');

            grandTotal += result;
            displayValue = String(result);
            firstOperand = null;
            operator = null;
            waitingForSecondOperand = true;
            clearRepeatState();
            updateDisplay();
        }

        function markUp() {
            if (isReviewing) exitReview();
            if (error || firstOperand === null || !operator) return;
            mrcCount = 0;

            const inputValue = parseDisplayValue();
            let result = 0;

            if (operator === '+') {
                result = firstOperand + (firstOperand * (inputValue / 100));
            } else if (operator === '-') {
                result = firstOperand - (firstOperand * (inputValue / 100));
            } else if (operator === '*') {
                result = firstOperand * (1 + (inputValue / 100));
            } else if (operator === '/') {
                result = firstOperand / (1 - (inputValue / 100));
            }

            result = round12(result);
            displayValue = String(result);
            firstOperand = null;
            operator = null;
            waitingForSecondOperand = true;
            clearRepeatState();
            updateDisplay();
        }

        function calculateRoot() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;

            const val = parseDisplayValue();
            if (val < 0) {
                error = true;
            } else {
                const result = round12(Math.sqrt(val));
                displayValue = String(result);
                recordStep('√(' + val + ')', '=');
                recordStep(displayValue, '');
            }
            waitingForSecondOperand = true;
            clearRepeatState();
            updateDisplay();
        }

        function memoryAdd() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;
            memory += parseDisplayValue();
            waitingForSecondOperand = true;
            updateDisplay();
        }

        function memorySub() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;
            memory -= parseDisplayValue();
            waitingForSecondOperand = true;
            updateDisplay();
        }

        function handleMRC() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount++;
            if (mrcCount === 1) {
                displayValue = String(memory);
                waitingForSecondOperand = true;
                updateDisplay();
            } else if (mrcCount >= 2) {
                memory = 0;
                mrcCount = 0;
                updateDisplay();
            }
        }

        function handleGT() {
            if (isReviewing) exitReview();
            if (error) return;
            mrcCount = 0;
            displayValue = String(grandTotal);
            waitingForSecondOperand = true;
            updateDisplay();
        }

        function clearEntry() {
            if (isReviewing) exitReview();
            displayValue = '0';
            error = false;
            mrcCount = 0;
            updateDisplay();
        }

        function allClear() {
            isReviewing = false;
            displayValue = '0';
            firstOperand = null;
            operator = null;
            waitingForSecondOperand = false;
            repeatOperator = null;
            repeatOperand = null;
            grandTotal = 0;
            error = false;
            mrcCount = 0;
            historySteps = [];
            reviewIndex = -1;
            updateDisplay();
        }

        function prevStep() {
            if (historySteps.length === 0) return;
            if (!isReviewing) {
                isReviewing = true;
                reviewIndex = historySteps.length - 1;
            } else if (reviewIndex > 0) {
                reviewIndex--;
            }
            updateDisplay();
        }

        function nextStep() {
            if (!isReviewing || historySteps.length === 0) return;
            if (reviewIndex < historySteps.length - 1) {
                reviewIndex++;
                updateDisplay();
            } else {
                exitReview();
            }
        }

        function autoReview() {
            if (historySteps.length === 0) return;
            isReviewing = true;
            reviewIndex = 0;
            updateDisplay();

            const interval = setInterval(() => {
                if (!isReviewing) {
                    clearInterval(interval);
                    return;
                }
                if (reviewIndex < historySteps.length - 1) {
                    reviewIndex++;
                    updateDisplay();
                } else {
                    clearInterval(interval);
                    setTimeout(exitReview, 1000);
                }
            }, 1000);
        }

        function flashDisplay() {
            const origColor = displayEl.style.color;
            displayEl.style.color = 'transparent';
            setTimeout(() => { displayEl.style.color = origColor; }, 100);
        }

        function toggleFormat() {
            isIndianFormat = !isIndianFormat;
            updateDisplay();
        }

        function handleKeyboard(event) {
            if (event.ctrlKey || event.metaKey || event.altKey) return;

            const key = event.key;
            if (/^\d$/.test(key)) {
                event.preventDefault();
                inputDigit(key);
                return;
            }

            switch (key) {
                case '.':
                    event.preventDefault();
                    inputDecimal();
                    break;
                case '+':
                    event.preventDefault();
                    handleOperator('+');
                    break;
                case '-':
                    event.preventDefault();
                    handleOperator('-');
                    break;
                case '*':
                    event.preventDefault();
                    handleOperator('*');
                    break;
                case '/':
                    event.preventDefault();
                    handleOperator('/');
                    break;
                case 'Enter':
                case '=':
                    event.preventDefault();
                    calculate();
                    break;
                case 'Backspace':
                    event.preventDefault();
                    backspace();
                    break;
                case 'Escape':
                    event.preventDefault();
                    allClear();
                    break;
            }
        }

        document.addEventListener('keydown', handleKeyboard, { passive: false });

        document.querySelectorAll('button').forEach((btn) => {
            btn.addEventListener('touchstart', () => {}, { passive: true });
        });

        updateDisplay();
    </script>
</body>
</html>
